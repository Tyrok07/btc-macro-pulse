name: Günlük Makro Rapor Otomasyonu

on:
  schedule:
    # Her gün UTC saatiyle 06:00'da (Türkiye saatiyle 09:00'da) otomatik çalışır
    - cron: "0 6 * * *"
  workflow_dispatch: # İstediğiniz an GitHub üzerinden elle çalıştırma butonu açar

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları Yükle
        run: |
          pip install yfinance pandas requests

      - name: Raporu Çalıştır ve Telegram'a Gönder
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_bot.py
